apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-selector-app
  namespace: default
  labels:
    app: selector-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selector-app-pod
  template:
    metadata:
      labels:
        app: selector-app-pod
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: test-selector-service
  namespace: default
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: selector-app
