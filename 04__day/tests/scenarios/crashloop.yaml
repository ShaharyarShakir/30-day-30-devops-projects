apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-crashloop
  namespace: default
  labels:
    app: test-crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-crashloop
  template:
    metadata:
      labels:
        app: test-crashloop
    spec:
      containers:
      - name: crashy-container
        image: busybox
        command: ["sh", "-c"]
        args:
        - |
          if [ -z "$MISSING_ENV" ]; then
            echo "Error: MISSING_ENV environment variable is not defined!" >&2
            exit 1
          else
            echo "Running normally with env: $MISSING_ENV"
            sleep 3600
          fi
