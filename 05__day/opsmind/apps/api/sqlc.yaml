version: "2"

sql:
  - engine: postgresql

    schema:
      - db/migrations

    queries:
      - db/query

    gen:
      go:
        package: database

        out: internal/database

        sql_package: pgx/v5

        emit_json_tags: true

        overrides:
          - db_type: uuid

            go_type:
              import: github.com/google/uuid

              type: UUID
