version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: nomad-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: nomad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  garage:
    image: dxflrs/garage:v0.9.4
    container_name: nomad-garage
    restart: unless-stopped
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # Admin API
    volumes:
      - ./infra/docker/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    command: /garage server

  garage-webui:
    image: khairul169/garage-webui:latest
    container_name: nomad-garage-webui
    restart: unless-stopped
    ports:
      - "3909:3909"
    volumes:
      - ./infra/docker/garage.toml:/etc/garage.toml:ro
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
    depends_on:
      - garage

volumes:
  mongodb_data:
  redis_data:
  garage_meta:
  garage_data:

