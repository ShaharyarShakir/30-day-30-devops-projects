services:
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}
      - LIVEKIT_CONFIG=/etc/livekit/livekit.yaml
    volumes:
      - ./../livekit/livekit.yaml:/etc/livekit/livekit.yaml
