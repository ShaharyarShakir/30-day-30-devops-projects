services:
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-6e74b33534b8c9f5f096238b1f5d6f1234567890abcdef0123456789abcdef01}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-platform_secure_admin_token_123}
    volumes:
      - ../garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/mnt/garage/meta
      - garage-data:/mnt/garage/data
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - default

networks:
  default:
    name: platform-network

volumes:
  garage-meta:
  garage-data:
