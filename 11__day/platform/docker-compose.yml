services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - kafka
    environment:
      - NODE_ENV=production
      - PORT=4000
    networks:
      - platform-network

  identity:
    build:
      context: services/identity
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - kafka
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - platform-network

  user:
    build:
      context: services/user
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      - postgres
      - kafka
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - platform-network

  course:
    build:
      context: services/course
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    depends_on:
      - postgres
      - kafka
    environment:
      - DB_HOST=postgres
      - KAFKA_BROKERS=kafka:9092
    networks:
      - platform-network

  classroom:
    build:
      context: services/classroom
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:9092
    networks:
      - platform-network

  live-session:
    build:
      context: services/live-session
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    depends_on:
      - postgres
      - redis
      - kafka
      - livekit
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:9092
      - LIVEKIT_URL=http://livekit:7880
    networks:
      - platform-network

  coding:
    build:
      context: services/coding
      dockerfile: Dockerfile
    ports:
      - "5007:5007"
    depends_on:
      - postgres
      - kafka
    environment:
      - DB_HOST=postgres
      - KAFKA_BROKERS=kafka:9092
    networks:
      - platform-network

  judge:
    build:
      context: services/judge
      dockerfile: Dockerfile
    ports:
      - "5008:5008"
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKERS=kafka:9092
    networks:
      - platform-network

  media-service:
    build:
      context: services/media-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
    networks:
      - platform-network

  video-worker:
    build:
      context: services/video-worker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - garage
    environment:
      - KAFKA_BROKERS=kafka:9092
      - GARAGE_URL=http://garage:3456
    networks:
      - platform-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://gateway:4000
    networks:
      - platform-network

include:
  - infrastructure/compose/postgres.yml
  - infrastructure/compose/mongodb.yml
  - infrastructure/compose/redis.yml
  - infrastructure/compose/kafka.yml
  - infrastructure/compose/mailpit.yml
  - infrastructure/compose/garage.yml
  - infrastructure/compose/livekit.yml
  - infrastructure/compose/coding.yml

networks:
  platform-network:
    driver: bridge
