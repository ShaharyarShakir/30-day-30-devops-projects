events {
    worker_connections 1024;
}

http {
    upstream gateway_http {
        least_conn;
        server gateway-1:4000;
        server gateway-2:4000;
        server gateway-3:4000;
    }

    upstream gateway_websocket {
        least_conn;
        server gateway-1:4001;
        server gateway-2:4001;
        server gateway-3:4001;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        # HTTP API Gateway
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://gateway_http;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket Gateway
        location /socket.io/ {
            limit_req zone=ws_limit burst=10 nodelay;
            
            proxy_pass http://gateway_websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://gateway_http/health;
            access_log off;
        }

        # Metrics endpoint (restrict in production)
        location /metrics {
            proxy_pass http://gateway_http/metrics;
            # Add IP whitelist in production
            # allow 10.0.0.0/8;
            # deny all;
        }
    }
}
