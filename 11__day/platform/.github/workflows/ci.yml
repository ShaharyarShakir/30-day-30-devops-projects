name: Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Node/TypeScript CI
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "platform/package-lock.json"

      - name: Install Node dependencies
        run: |
          cd platform
          npm ci --legacy-peer-deps

      - name: Run ESLint Checks
        run: |
          cd platform
          npm run lint

      # 2. Kotlin/Java CI
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x platform/services/auth/gradlew

      - name: Build and Test Kotlin Auth Service
        run: |
          cd platform/services/auth
          ./gradlew build -x test

      # 3. Go CI
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check Go Formatting
        run: |
          cd platform/packages/shared-go
          gofmt -d .

      # 4. Python CI
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python tools
        run: pip install ruff black

      - name: Check Python Syntax
        run: |
          cd platform/packages/shared-python
          black --check .
          ruff check .

      # 5. Docker Validation
      - name: Verify Docker Compose Configuration
        run: |
          cd platform
          docker compose -f infrastructure/compose/docker-compose.yml config
