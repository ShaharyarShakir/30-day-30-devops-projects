name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download Dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: backend

      - name: Run Tests
        run: go test ./...

      - name: Run Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/api

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run check
        run: npm run check

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

  dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.2.0
        with:
          dockerfile: backend/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.2.0
        with:
          dockerfile: frontend/Dockerfile

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        run: helm lint ./helm/url-shortener

      - name: Render Helm Chart Template
        run: helm template test ./helm/url-shortener > rendered.yaml

  kustomize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Kustomize validation
        run: kubectl kustomize kustomize/overlays/dev

  docker:
    needs:
      - backend
      - frontend
      - dockerfile
      - helm
      - kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            shaharyarshakir/url-shortener-backend:latest
            shaharyarshakir/url-shortener-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            shaharyarshakir/url-shortener-frontend:latest
            shaharyarshakir/url-shortener-frontend:${{ github.sha }}

  trivy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          severity: HIGH,CRITICAL

      - name: Login to Docker Hub (for private image pulls)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan Backend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: shaharyarshakir/url-shortener-backend:latest
          format: sarif
          output: trivy-results-backend.sarif

      - name: Scan Frontend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: shaharyarshakir/url-shortener-frontend:latest
          format: sarif
          output: trivy-results-frontend.sarif

      - name: Upload Backend SARIF Report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-backend.sarif
          category: backend-image

      - name: Upload Frontend SARIF Report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-frontend.sarif
          category: frontend-image

  update-helm-tag:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Helm and Kustomize values
        run: |
          # Update tags in Helm Chart
          yq eval '.backend.image.tag = "${{ github.sha }}"' -i helm/url-shortener/values.yaml
          yq eval '.frontend.image.tag = "${{ github.sha }}"' -i helm/url-shortener/values.yaml

          # Update tags in Kustomize Base values
          yq eval '.backend.image.tag = "${{ github.sha }}"' -i kustomize/base/values.yaml
          yq eval '.frontend.image.tag = "${{ github.sha }}"' -i kustomize/base/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/url-shortener/values.yaml kustomize/base/values.yaml
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin main
