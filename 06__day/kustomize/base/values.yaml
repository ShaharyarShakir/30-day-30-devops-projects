namespace: url-shortener

backend:
  replicaCount: 2

  image:
    repository: shaharyarshakir/url-shortener-backend
    tag: latest
    pullPolicy: IfNotPresent

  service:
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 2

  image:
    repository: shaharyarshakir/url-shortener-frontend
    tag: latest
    pullPolicy: IfNotPresent

  service:
    port: 80

postgres:
  image:
    repository: postgres
    tag: 17-alpine

  storage: 10Gi

vault:
  enabled: true
  role: url-shortener

ingress:
  enabled: true
  className: nginx

  host: short.local
