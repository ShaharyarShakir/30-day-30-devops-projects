apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}-postgres
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "url-shortener.selectorLabels" . | nindent 4 }}
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
