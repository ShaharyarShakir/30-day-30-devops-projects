services:
  backend:
    build:
      context: ./backend
      target: development

    volumes:
      - ./backend:/app

    ports:
      - "8080:8080"

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      target: development

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      VITE_API_URL: http://localhost:8080

    ports:
      - "5173:5173"

    depends_on:
      - backend

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: