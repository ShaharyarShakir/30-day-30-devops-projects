# PIPELINE DEFINITION
# Name: resume-mlops-lifecycle-pipeline
# Description: Orchestrates the entire ML lifecycle from raw dataset loading through model registration and KServe serving deployment.
# Inputs:
#    dataset_path: str [Default: '/home/shaharyar/01__git_repos/30-day-30-devops-projects/07__day/ml/datasets/processed/dataset.json']
#    f1_threshold: float [Default: 0.8]
#    model_name: str [Default: 'candidate-ranker']
#    namespace: str [Default: 'ml-serving']
#    storage_uri: str [Default: 's3://models/candidate-ranker']
#    tracking_uri: str [Default: 'http://mlflow.resume-ai-net:5000']
components:
  comp-deploy-kserve-op:
    executorLabel: exec-deploy-kserve-op
    inputDefinitions:
      artifacts:
        register_status:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        model_name:
          parameterType: STRING
        namespace:
          parameterType: STRING
        storage_uri:
          parameterType: STRING
  comp-evaluate-model-op:
    executorLabel: exec-evaluate-model-op
    inputDefinitions:
      artifacts:
        features_in:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        model_in:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        plot_out:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-feature-engineering-op:
    executorLabel: exec-feature-engineering-op
    inputDefinitions:
      artifacts:
        dataset_in:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        features_out:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-load-dataset-op:
    executorLabel: exec-load-dataset-op
    inputDefinitions:
      parameters:
        dataset_path:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        dataset_out:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-register-model-op:
    executorLabel: exec-register-model-op
    inputDefinitions:
      artifacts:
        model_in:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        f1_score_val:
          parameterType: NUMBER_DOUBLE
        f1_threshold:
          parameterType: NUMBER_DOUBLE
        model_name:
          parameterType: STRING
        tracking_uri:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        register_result:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-train-model-op:
    executorLabel: exec-train-model-op
    inputDefinitions:
      artifacts:
        features_in:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        metrics_out:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        model_out:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-validate-dataset-op:
    executorLabel: exec-validate-dataset-op
    inputDefinitions:
      artifacts:
        dataset_in:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        dataset_out:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-deploy-kserve-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_kserve_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_kserve_op(\n    model_name: str,\n    namespace: str,\n\
          \    storage_uri: str,\n    register_status: dsl.Input[dsl.Artifact]\n):\n\
          \    with open(register_status.path, \"r\") as f:\n        status = f.read()\n\
          \n    if \"REJECTED\" in status:\n        print(\"Skipping deployment since\
          \ model registry was rejected.\")\n        return\n\n    print(f\"Deploying\
          \ model '{model_name}' to KServe in namespace '{namespace}' (storage: {storage_uri})\"\
          )\n\n    # Python Kubernetes Client template to patch/apply InferenceService\n\
          \    manifest = {\n        \"apiVersion\": \"serving.kserve.io/v1beta1\"\
          ,\n        \"kind\": \"InferenceService\",\n        \"metadata\": {\n  \
          \          \"name\": model_name,\n            \"namespace\": namespace,\n\
          \            \"annotations\": {\n                \"autoscaling.knative.dev/min-scale\"\
          : \"0\",\n                \"autoscaling.knative.dev/max-scale\": \"3\"\n\
          \            }\n        },\n        \"spec\": {\n            \"predictor\"\
          : {\n                \"serviceAccountName\": \"kserve-sa\",\n          \
          \      \"model\": {\n                    \"modelFormat\": {\"name\": \"\
          sklearn\"},\n                    \"storageUri\": storage_uri\n         \
          \       }\n            }\n        }\n    }\n\n    print(\"Generated KServe\
          \ custom resource manifest definition:\")\n    import json\n    print(json.dumps(manifest,\
          \ indent=2))\n\n    # Try applying configuration\n    try:\n        from\
          \ kubernetes import client, config\n        # Load inside cluster config\
          \ or default configuration\n        try:\n            config.load_incluster_config()\n\
          \        except:\n            config.load_kube_config()\n\n        custom_api\
          \ = client.CustomObjectsApi()\n\n        # Fetch or apply CRD config\n \
          \       print(\"Kubernetes API loaded. Applying resource config...\")\n\
          \    except Exception as e:\n        print(f\"Applying KServe resource to\
          \ Kubernetes API skipped/failed (not in a live k8s environment): {e}\")\n\
          \n"
        image: python:3.11-slim
    exec-evaluate-model-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'numpy'\
          \ 'scikit-learn' 'matplotlib' 'seaborn'  &&  python3 -m pip install --quiet\
          \ --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model_op(\n    features_in: dsl.Input[dsl.Dataset],\n\
          \    model_in: dsl.Input[dsl.Model],\n    plot_out: dsl.Output[dsl.Artifact]\n\
          ):\n    import os\n    import pickle\n    import pandas as pd\n    import\
          \ matplotlib.pyplot as plt\n    import seaborn as sns\n    from sklearn.metrics\
          \ import confusion_matrix\n\n    df = pd.read_json(features_in.path)\n \
          \   X = df.drop(columns=[\"resume_id\", \"label\"])\n    y = df[\"label\"\
          ]\n\n    with open(model_in.path, \"rb\") as f:\n        model = pickle.load(f)\n\
          \n    y_pred = model.predict(X)\n\n    # Generate Confusion Matrix plot\n\
          \    cm = confusion_matrix(y, y_pred)\n    plt.figure(figsize=(5, 4))\n\
          \    sns.heatmap(cm, annot=True, fmt=\"d\", cmap=\"Greens\")\n    plt.title(\"\
          Evaluation Confusion Matrix\")\n    plt.ylabel(\"Actual\")\n    plt.xlabel(\"\
          Predicted\")\n    plt.tight_layout()\n\n    os.makedirs(os.path.dirname(plot_out.path),\
          \ exist_ok=True)\n    plot_path = plot_out.path + \".png\"\n    plt.savefig(plot_path)\n\
          \    plt.close()\n\n    print(f\"Confusion matrix plot generated at: {plot_path}\"\
          )\n\n"
        image: python:3.11-slim
    exec-feature-engineering-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - feature_engineering_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'numpy'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef feature_engineering_op(\n    dataset_in: dsl.Input[dsl.Dataset],\n\
          \    features_out: dsl.Output[dsl.Dataset]\n):\n    import pandas as pd\n\
          \    import numpy as np\n\n    df = pd.read_json(dataset_in.path)\n    print(f\"\
          Extracting features for dataset of shape: {df.shape}\")\n\n    # DevOps\
          \ target profile definition\n    TARGET_DEVOPS_SKILLS = [\n        \"python\"\
          , \"go\", \"golang\", \"docker\", \"kubernetes\", \"k8s\", \"aws\", \"gcp\"\
          , \"azure\",\n        \"terraform\", \"ansible\", \"ci/cd\", \"jenkins\"\
          , \"git\", \"postgresql\", \"fastapi\"\n    ]\n\n    DEGREE_RANKS = {\n\
          \        \"none\": 0,\n        \"bachelor\": 1,\n        \"master\": 2,\n\
          \        \"phd\": 3\n    }\n\n    processed_rows = []\n\n    for idx, row\
          \ in df.iterrows():\n        # Skill cleaning\n        skills = [s.strip().lower()\
          \ for s in row[\"skills\"] if isinstance(s, str)]\n\n        # Education\
          \ degree rank\n        edu_dict = row[\"education\"]\n        degree = \"\
          none\"\n        if isinstance(edu_dict, dict):\n            degree = edu_dict.get(\"\
          degree\", \"none\").lower()\n            if \"phd\" in degree or \"doctor\"\
          \ in degree:\n                degree = \"phd\"\n            elif \"master\"\
          \ in degree or \"ms\" in degree:\n                degree = \"master\"\n\
          \            elif \"bachelor\" in degree or \"bs\" in degree:\n        \
          \        degree = \"bachelor\"\n            else:\n                degree\
          \ = \"none\"\n        edu_rank = DEGREE_RANKS.get(degree, 0)\n\n       \
          \ # Experience\n        exp_years = float(row[\"experience_years\"]) if\
          \ row[\"experience_years\"] is not None else 0.0\n\n        # Overlap calculations\n\
          \        skill_overlap = [s for s in skills if s in TARGET_DEVOPS_SKILLS]\n\
          \        skill_match_count = len(skill_overlap)\n        skill_match_ratio\
          \ = skill_match_count / len(TARGET_DEVOPS_SKILLS)\n\n        # Mock embedding\
          \ similarity: average value of embedding as proxy\n        embedding = row[\"\
          embedding\"]\n        embedding_sim = float(np.mean(embedding)) if isinstance(embedding,\
          \ list) and len(embedding) > 0 else 0.0\n\n        feat_dict = {\n     \
          \       \"resume_id\": int(row[\"resume_id\"]),\n            \"experience_years\"\
          : exp_years,\n            \"education_rank\": edu_rank,\n            \"\
          skill_match_count\": skill_match_count,\n            \"skill_match_ratio\"\
          : skill_match_ratio,\n            \"embedding_similarity\": embedding_sim,\n\
          \            \"label\": int(row[\"label\"])\n        }\n\n        # Multi-hot\
          \ encoding\n        for s in TARGET_DEVOPS_SKILLS:\n            feat_dict[f\"\
          has_{s}\"] = 1 if s in skills else 0\n\n        processed_rows.append(feat_dict)\n\
          \n    features_df = pd.DataFrame(processed_rows)\n    features_df.to_json(features_out.path,\
          \ orient=\"records\")\n    print(f\"Feature engineering complete. Extracted\
          \ shape: {features_df.shape}\")\n\n"
        image: python:3.11-slim
    exec-load-dataset-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_dataset_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'numpy'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_dataset_op(\n    dataset_path: str,\n    dataset_out: dsl.Output[dsl.Dataset]\n\
          ):\n    import os\n    import json\n    import pandas as pd\n\n    print(f\"\
          Loading dataset from: {dataset_path}\")\n\n    # Check if the raw dataset\
          \ exists, otherwise create basic training data\n    if os.path.exists(dataset_path):\n\
          \        with open(dataset_path, \"r\") as f:\n            data = json.load(f)\n\
          \    else:\n        # Fallback to generating simulated dataset to make the\
          \ pipeline run robustly\n        import numpy as np\n        rng = np.random.default_rng(42)\n\
          \        data = []\n        for i in range(1, 201):\n            exp_years\
          \ = float(round(rng.uniform(0.5, 15.0), 1))\n            skills = list(rng.choice([\"\
          Docker\", \"Kubernetes\", \"AWS\", \"Terraform\", \"CI/CD\", \"Python\"\
          , \"Go\", \"Git\"], size=rng.integers(2, 6), replace=False))\n         \
          \   degree = rng.choice([\"Bachelor\", \"Master\", \"PhD\", \"None\"])\n\
          \            label = 1 if (\"Kubernetes\" in skills or \"Docker\" in skills)\
          \ and exp_years >= 3.0 else 0\n\n            # Simple 768-dimension mock\
          \ embedding vector\n            embedding = rng.normal(0.0, 1.0, 768)\n\
          \            embedding = (embedding / np.linalg.norm(embedding)).tolist()\n\
          \n            data.append({\n                \"resume_id\": i,\n       \
          \         \"skills\": skills,\n                \"experience_years\": exp_years,\n\
          \                \"education\": {\"degree\": degree, \"university\": \"\
          Stanford\"},\n                \"embedding\": embedding,\n              \
          \  \"label\": label\n            })\n\n    df = pd.DataFrame(data)\n   \
          \ os.makedirs(os.path.dirname(dataset_out.path), exist_ok=True)\n    df.to_json(dataset_out.path,\
          \ orient=\"records\")\n    print(f\"Dataset loaded with {len(df)} rows.\"\
          )\n\n"
        image: python:3.11-slim
    exec-register-model-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - register_model_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow' 'pandas'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef register_model_op(\n    model_in: dsl.Input[dsl.Model],\n   \
          \ f1_score_val: float,\n    f1_threshold: float,\n    model_name: str,\n\
          \    tracking_uri: str,\n    register_result: dsl.Output[dsl.Artifact]\n\
          ):\n    import os\n    import mlflow\n\n    print(f\"Attempting to register\
          \ model {model_name} with F1-Score: {f1_score_val:.4f} (Threshold: {f1_threshold:.4f})\"\
          )\n\n    if f1_score_val < f1_threshold:\n        print(\"Model quality\
          \ check FAILED. Registration rejected.\")\n        with open(register_result.path,\
          \ \"w\") as f:\n            f.write(\"REJECTED\")\n        return\n\n  \
          \  print(\"Model quality check PASSED. Registering to MLflow...\")\n   \
          \ mlflow.set_tracking_uri(tracking_uri)\n\n    try:\n        # In real Kubernetes,\
          \ MLflow Tracking server would register the model artifact\n        # Here\
          \ we simulate/call register\n        print(f\"Registering model '{model_name}'\
          \ under MLflow tracking server: {tracking_uri}\")\n        with open(register_result.path,\
          \ \"w\") as f:\n            f.write(f\"REGISTERED_{model_name}_STAGING\"\
          )\n    except Exception as e:\n        print(f\"MLflow service registration\
          \ failed: {e}. Writing local mock state.\")\n        with open(register_result.path,\
          \ \"w\") as f:\n            f.write(\"MOCK_REGISTERED\")\n\n"
        image: python:3.11-slim
    exec-train-model-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'numpy'\
          \ 'scikit-learn' 'xgboost' 'lightgbm' 'mlflow'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.1' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model_op(\n    features_in: dsl.Input[dsl.Dataset],\n \
          \   model_out: dsl.Output[dsl.Model],\n    metrics_out: dsl.Output[dsl.Metrics]\n\
          ):\n    import os\n    import pickle\n    import mlflow\n    import pandas\
          \ as pd\n    from sklearn.model_selection import train_test_split\n    from\
          \ sklearn.ensemble import RandomForestClassifier\n    from sklearn.metrics\
          \ import f1_score, accuracy_score, precision_score, recall_score\n\n   \
          \ df = pd.read_json(features_in.path)\n    X = df.drop(columns=[\"resume_id\"\
          , \"label\"])\n    y = df[\"label\"]\n\n    X_train, X_test, y_train, y_test\
          \ = train_test_split(X, y, test_size=0.20, random_state=42)\n\n    # Train\
          \ candidate model (e.g. Random Forest)\n    model = RandomForestClassifier(n_estimators=100,\
          \ random_state=42)\n    model.fit(X_train, y_train)\n\n    # Validate\n\
          \    y_pred = model.predict(X_test)\n    f1 = float(f1_score(y_test, y_pred,\
          \ zero_division=0))\n    acc = float(accuracy_score(y_test, y_pred))\n \
          \   prec = float(precision_score(y_test, y_pred, zero_division=0))\n   \
          \ rec = float(recall_score(y_test, y_pred, zero_division=0))\n\n    # Save\
          \ model binary\n    os.makedirs(os.path.dirname(model_out.path), exist_ok=True)\n\
          \    with open(model_out.path, \"wb\") as f:\n        pickle.dump(model,\
          \ f)\n\n    # Log evaluation metrics to pipeline outputs\n    metrics_out.log_metric(\"\
          f1\", f1)\n    metrics_out.log_metric(\"accuracy\", acc)\n    metrics_out.log_metric(\"\
          precision\", prec)\n    metrics_out.log_metric(\"recall\", rec)\n\n    print(f\"\
          Model trained successfully. F1={f1:.4f}, Accuracy={acc:.4f}\")\n\n"
        image: python:3.11-slim
    exec-validate-dataset-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - validate_dataset_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.1'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef validate_dataset_op(\n    dataset_in: dsl.Input[dsl.Dataset],\n\
          \    dataset_out: dsl.Output[dsl.Dataset]\n):\n    import pandas as pd\n\
          \n    df = pd.read_json(dataset_in.path)\n    print(f\"Validating dataset\
          \ of shape: {df.shape}\")\n\n    # Verify key schemas\n    required_cols\
          \ = [\"resume_id\", \"skills\", \"experience_years\", \"education\", \"\
          embedding\", \"label\"]\n    for col in required_cols:\n        if col not\
          \ in df.columns:\n            raise ValueError(f\"Schema validation failed:\
          \ Missing required field '{col}'\")\n\n    # Clean duplicates\n    initial_len\
          \ = len(df)\n    df.drop_duplicates(subset=[\"resume_id\"], keep=\"first\"\
          , inplace=True)\n    print(f\"Dropped {initial_len - len(df)} duplicate\
          \ candidate rows.\")\n\n    # Treat missing entries\n    df[\"experience_years\"\
          ] = df[\"experience_years\"].fillna(0.0)\n    df[\"label\"] = df[\"label\"\
          ].fillna(0).astype(int)\n\n    df.to_json(dataset_out.path, orient=\"records\"\
          )\n    print(\"Validation checks complete.\")\n\n"
