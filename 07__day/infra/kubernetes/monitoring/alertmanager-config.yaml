global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK_URL'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'slack-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'email-critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#resume-ai-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonAnnotations.summary }}'
        text: >-
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* `{{ .CommonLabels.severity }}`
          *Dashboard:* <http://grafana.resume-ai.local/d/api-health|API Dashboard>

  - name: 'email-critical-alerts'
    email_configs:
      - to: 'ops-team@resume-ai.local'
        from: 'alertmanager@resume-ai.local'
        smarthost: 'smtp.resume-ai.local:587'
        auth_username: 'alertmanager'
        auth_password: 'smtp-password'
        require_tls: true
        send_resolved: true

  - name: 'msteams-notifications'
    webhook_configs:
      - url: 'https://resume-ai.webhook.office.com/webhookb2/teams-connector-endpoint'
        send_resolved: true
