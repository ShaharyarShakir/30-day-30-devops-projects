apiVersion: batch/v1
kind: CronJob
metadata:
  name: dvc-metadata-backup-job
  namespace: resume-ai
spec:
  schedule: "0 4 * * *" # Daily at 4 AM
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: dvc-backup
              image: alpine/git:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Backing up DVC metadata files (.dvc)..."
                  git clone https://github.com/ShaharyarShakir/30-day-30-devops-projects.git repo
                  cd repo
                  tar -cvf /backups/dvc_metadata_$(date +%Y%m%d).tar $(find . -name "*.dvc")
                  echo "DVC metadata backup complete!"
              volumeMounts:
                - name: backup-volume
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: backup-pvc
