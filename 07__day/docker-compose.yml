name: resume-ai-platform

networks:
  resume-ai-net:
    driver: bridge

volumes:
  postgres-data:
  garage-meta:
  garage-data:
  kafka-data:

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume-ai-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resume-ai-net

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: resume-ai-garage
    restart: unless-stopped
    ports:
      - "${GARAGE_API_PORT}:${GARAGE_API_PORT}"
      - "${GARAGE_WEB_PORT}:${GARAGE_WEB_PORT}"
      - "${GARAGE_ADMIN_PORT}:${GARAGE_ADMIN_PORT}"
    volumes:
      - ./infra/docker/garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resume-ai-net

  # One-shot job: waits for Garage, then assigns layout, imports key, and creates buckets.
  garage-init:
    build:
      context: ./infra/docker/garage-init
    container_name: resume-ai-garage-init
    depends_on:
      garage:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./infra/docker/garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
    networks:
      - resume-ai-net

  mlflow:
    build:
      context: ./infra/docker/mlflow
    container_name: resume-ai-mlflow
    restart: unless-stopped
    env_file: .env
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
      MLFLOW_S3_ENDPOINT_URL: ${GARAGE_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    networks:
      - resume-ai-net

  redis:
    image: redis:7-alpine
    container_name: resume-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - resume-ai-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: resume-ai-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - resume-ai-net

  auth-service:
    build:
      context: ./backend/auth-service
    container_name: resume-ai-auth
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: super-secret-dev-key
      PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resume-ai-net

  resume-service:
    build:
      context: ./backend/resume-service
    container_name: resume-ai-resume
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GARAGE_ENDPOINT: ${GARAGE_ENDPOINT}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      RESUMES_BUCKET: resumes
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks:
      - resume-ai-net

  ml-service:
    build:
      context: ./backend/ml-service
    container_name: resume-ai-ml
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GARAGE_ENDPOINT: ${GARAGE_ENDPOINT}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      RESUMES_BUCKET: resumes
      PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    networks:
      - resume-ai-net

  resume-worker:
    build:
      context: ./backend/resume-worker
    container_name: resume-ai-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GARAGE_ENDPOINT: ${GARAGE_ENDPOINT}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      RESUMES_BUCKET: resumes
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks:
      - resume-ai-net

  gateway:
    build:
      context: ./backend/gateway
    container_name: resume-ai-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      RESUME_SERVICE_URL: http://resume-service:8082
      ML_SERVICE_URL: http://ml-service:8083
      JWT_SECRET: super-secret-dev-key
    depends_on:
      auth-service:
        condition: service_started
      resume-service:
        condition: service_started
      ml-service:
        condition: service_started
      resume-worker:
        condition: service_started
    networks:
      - resume-ai-net

