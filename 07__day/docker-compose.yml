name: resume-ai-platform

networks:
  resume-ai-net:
    driver: bridge

volumes:
  postgres-data:
  garage-meta:
  garage-data:
  rabbitmq-data:

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume-ai-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resume-ai-net

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: resume-ai-garage
    restart: unless-stopped
    ports:
      - "${GARAGE_API_PORT}:${GARAGE_API_PORT}"
      - "${GARAGE_WEB_PORT}:${GARAGE_WEB_PORT}"
      - "${GARAGE_ADMIN_PORT}:${GARAGE_ADMIN_PORT}"
    volumes:
      - ./infra/docker/garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resume-ai-net

  # One-shot job: waits for Garage, then assigns layout, imports key, and creates buckets.
  garage-init:
    build:
      context: ./infra/docker/garage-init
    container_name: resume-ai-garage-init
    depends_on:
      garage:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./infra/docker/garage/garage.toml:/etc/garage.toml:ro
    networks:
      - resume-ai-net

  mlflow:
    build:
      context: ./infra/docker/mlflow
    container_name: resume-ai-mlflow
    restart: unless-stopped
    env_file: .env
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
      MLFLOW_S3_ENDPOINT_URL: ${GARAGE_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    networks:
      - resume-ai-net

  redis:
    image: redis:7-alpine
    container_name: resume-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - resume-ai-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: resume-ai-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - resume-ai-net
