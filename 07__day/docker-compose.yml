name: resume-ai-platform

networks:
  resume-ai-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  rabbitmq-data:

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume-ai-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resume-ai-net

  minio:
    image: minio/minio:latest
    container_name: resume-ai-minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - resume-ai-net

  # One-shot job: waits for MinIO, then creates the buckets Phase 1 needs.
  minio-init:
    image: minio/mc:latest
    container_name: resume-ai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/datasets local/models local/artifacts &&
      echo 'buckets ready'
      "
    networks:
      - resume-ai-net

  mlflow:
    build:
      context: ./infra/docker/mlflow
    container_name: resume-ai-mlflow
    restart: unless-stopped
    env_file: .env
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
      MLFLOW_S3_ENDPOINT_URL: ${MINIO_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - resume-ai-net

  redis:
    image: redis:7-alpine
    container_name: resume-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - resume-ai-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: resume-ai-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - resume-ai-net
