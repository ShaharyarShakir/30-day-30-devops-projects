apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: candidate-ranker
  annotations:
    autoscaling.knative.dev/min-scale: "1"
    autoscaling.knative.dev/max-scale: "10"
    autoscaling.knative.dev/target: "20"
spec:
  predictor:
    model:
      resources:
        limits:
          cpu: "2"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "2Gi"
