name: MLOps Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'ml/**'
      - 'infra/**'
      - '.github/workflows/mlops-pipeline.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ml/**'
      - 'infra/**'

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff

      - name: Run Black Formatter Check
        run: black --check ml/

      - name: Run Ruff Linter
        run: ruff check ml/

  test-ml:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/training/requirements.txt
          pip install pytest

      - name: Run Pytest
        run: |
          pytest ml/training/test_pipeline.py

  build-and-compile:
    runs-on: ubuntu-latest
    needs: test-ml
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/training/requirements.txt
          pip install kfp

      - name: Compile Kubeflow Pipeline
        run: |
          python ml/pipelines/pipeline.py
          if [ ! -f ml/pipelines/pipeline.yaml ]; then
            echo "Pipeline compilation failed!"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load Docker Image (Inference)
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ml-service
          file: ./backend/ml-service/Dockerfile
          push: false
          tags: resume-ai/ml-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
