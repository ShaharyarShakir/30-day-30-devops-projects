name: Machine Learning Training Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'ml/**'
      - '.github/workflows/ml-pipeline.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'ml/**'

jobs:
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-level: '3.11'
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ml/training/requirements.txt

    - name: Run Pipeline Unit Tests
      run: |
        python -m pytest ml/training/test_pipeline.py

    - name: Train Models & Tune Hyperparameters
      env:
        MLFLOW_TRACKING_URI: http://localhost:5000
      run: |
        python ml/training/train.py

    - name: Register Best Performing Model
      env:
        MLFLOW_TRACKING_URI: http://localhost:5000
      run: |
        python ml/training/register.py

    - name: Notify Success
      if: success()
      run: |
        echo "ML Pipeline executed successfully. Best model trained, evaluated, and registered."

    - name: Notify Failure
      if: failure()
      run: |
        echo "ML Pipeline execution failed. Please check the logs."
