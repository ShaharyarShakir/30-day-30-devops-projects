name: multichain-deploy-platform

networks:
  chaindeploy-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  vault-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: chaindeploy-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chaindeploy-net

  redis:
    image: redis:7-alpine
    container_name: chaindeploy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - chaindeploy-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chaindeploy-rabbitmq
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chaindeploy-net

  vault:
    image: hashicorp/vault:1.17
    container_name: chaindeploy-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    env_file: .env
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/file
    networks:
      - chaindeploy-net

  api:
    build:
      context: ./apps/api
    container_name: chaindeploy-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      API_PORT: ${API_PORT}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - chaindeploy-net

  frontend:
    build:
      context: ./apps/frontend
    container_name: chaindeploy-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - api
    networks:
      - chaindeploy-net

  builder:
    build:
      context: ./services
      dockerfile: builder/Dockerfile
    container_name: chaindeploy-builder
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chaindeploy-net

  deployer:
    build:
      context: ./services
      dockerfile: deployer/Dockerfile
    container_name: chaindeploy-deployer
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chaindeploy-net

  indexer:
    build:
      context: ./services
      dockerfile: indexer/Dockerfile
    container_name: chaindeploy-indexer
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chaindeploy-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: chaindeploy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - chaindeploy-net

  loki:
    image: grafana/loki:3.0.0
    container_name: chaindeploy-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./infra/docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - chaindeploy-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: chaindeploy-promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/docker/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
    networks:
      - chaindeploy-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: chaindeploy-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - chaindeploy-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: chaindeploy-grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    volumes:
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - chaindeploy-net