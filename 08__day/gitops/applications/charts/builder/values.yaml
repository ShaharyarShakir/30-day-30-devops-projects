replicaCount: 1

image:
  repository: ghcr.io/shaharyarshakir/chaindeploy-builder
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3001

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-postgresql:5432/chaindeploy"
  REDIS_URL: "redis://redis-master:6379"
