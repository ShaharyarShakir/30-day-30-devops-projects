apiVersion: v1
kind: Service
metadata:
  name: {{ include "builder.fullname" . }}
  labels:
    app: {{ include "builder.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    app: {{ include "builder.name" . }}
