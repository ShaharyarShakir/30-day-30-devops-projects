apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    app: {{ include "api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "api.name" . }}
  template:
    metadata:
      annotations:
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-secrets: "{{ .Values.vault.secretPath }}"
        vault.hashicorp.com/agent-inject-template-secrets: |
          {{ print "{{- with secret \"" .Values.vault.secretPath "\" -}}" }}
          {{ print "export JWT_SECRET=\"{{ .Data.data.JWT_SECRET }}\"" }}
          {{ print "export JWT_REFRESH_SECRET=\"{{ .Data.data.JWT_REFRESH_SECRET }}\"" }}
          {{ print "export GITHUB_OAUTH_CLIENT_ID=\"{{ .Data.data.GITHUB_OAUTH_CLIENT_ID }}\"" }}
          {{ print "export GITHUB_OAUTH_CLIENT_SECRET=\"{{ .Data.data.GITHUB_OAUTH_CLIENT_SECRET }}\"" }}
          {{ print "{{- end -}}" }}
        {{- end }}
      labels:
        app: {{ include "api.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args: [". /vault/secrets/secrets && node dist/main.js"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "api.fullname" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
