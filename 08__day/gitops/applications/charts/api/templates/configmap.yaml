apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    app: {{ include "api.name" . }}
data:
  API_PORT: {{ .Values.env.API_PORT | quote }}
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.env.REDIS_URL | quote }}
  VAULT_ADDR: {{ .Values.env.VAULT_ADDR | quote }}
  JWT_ACCESS_TTL: {{ .Values.env.JWT_ACCESS_TTL | quote }}
  JWT_REFRESH_TTL: {{ .Values.env.JWT_REFRESH_TTL | quote }}
  GITHUB_CALLBACK_URL: {{ .Values.env.GITHUB_CALLBACK_URL | quote }}
