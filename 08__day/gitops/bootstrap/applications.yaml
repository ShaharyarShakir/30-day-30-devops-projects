apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chaindeploy-applications
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/ShaharyarShakir/30-day-30-devops-projects.git'
    targetRevision: HEAD
    path: gitops/applications/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: chaindeploy-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
