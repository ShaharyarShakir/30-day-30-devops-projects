apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: chaindeploy-apps-multicluster
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: dev
            url: https://kubernetes.default.svc
            path: gitops/applications/overlays/dev
          - cluster: staging
            url: https://staging-cluster.internal:6443
            path: gitops/applications/overlays/staging
          - cluster: prod
            url: https://prod-cluster.internal:6443
            path: gitops/applications/overlays/prod
          - cluster: disaster-recovery
            url: https://dr-cluster.internal:6443
            path: gitops/applications/overlays/prod
  template:
    metadata:
      name: '{{cluster}}-chaindeploy'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/ShaharyarShakir/30-day-30-devops-projects.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: '{{url}}'
        namespace: chaindeploy-apps
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
