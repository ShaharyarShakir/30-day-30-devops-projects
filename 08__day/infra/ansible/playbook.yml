---
- name: Setup Kubernetes Cluster Nodes dependencies
  hosts: all
  become: true
  tasks:
    - name: Ensure OS dependencies are up to date
      apt:
        update_cache: yes
        upgrade: safe
      when: ansible_os_family == "Debian"

    - name: Install required baseline tooling
      apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - ufw
        state: present
      when: ansible_os_family == "Debian"

    - name: Configure sysctl network parameters for scalability
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      with_items:
        - { name: "net.ipv4.ip_forward", value: "1" }
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "fs.file-max", value: "2097152" }

    - name: Configure firewall ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      with_items:
        - '80'
        - '443'
        - '6443' # Kubernetes api server port

    - name: Deploy Docker repository keys
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Install docker-ce and container-run times
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      when: ansible_os_family == "Debian"

    - name: Start Container runtime service
      service:
        name: containerd
        state: started
        enabled: yes
