global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'chaindeploy-api'
    metrics_path: '/health' # Using health check as basic scrape target
    static_configs:
      - targets: ['api:3000']

  - job_name: 'chaindeploy-builder'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['builder:3001']

  - job_name: 'chaindeploy-deployer'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['deployer:3002']

  - job_name: 'chaindeploy-indexer'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['indexer:3003']
